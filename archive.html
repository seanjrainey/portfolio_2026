  <style>
    /* ── Archive page ───────────────────────────────────────── */
    .archive-hero {
      padding: clamp(3rem, 6vw, 6rem) 0 clamp(2rem, 4vw, 4rem);
    }

    .archive-hero__inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }

    .archive-headline {
      font-size: clamp(2.5rem, 5vw, 5rem);
      font-weight: var(--font-light);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--white);
    }

    /* ── Archive grid ───────────────────────────────────────── */
    .archive-grid {
      border-top: 1px solid var(--border);
    }

    .archive-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .archive-cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(40px, 5vw, 84px);
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }

    /* Vertical dividers: inset so they don't touch the horizontal rules */
    .archive-cell:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 20px;
      bottom: 20px;
      width: 1px;
      background: var(--border);
    }

    .archive-cell {
      cursor: pointer;
    }

    .archive-cell__image {
      max-width: 62%;
      max-height: 62%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      transition: opacity 0.35s ease;
    }

    .archive-cell:hover .archive-cell__image {
      opacity: 0.5;
    }

    /* ── Lightbox ───────────────────────────────────────────── */
    .archive-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 11, 11, 0.92);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .archive-lightbox.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .archive-lightbox__img {
      max-width: min(85vw, 900px);
      max-height: 82vh;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .archive-lightbox__caption {
      position: absolute;
      bottom: clamp(20px, 4vw, 40px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      font-weight: var(--font-medium);
      letter-spacing: -0.01em;
      color: var(--muted);
      white-space: nowrap;
    }

    .archive-lightbox__close {
      position: absolute;
      top: clamp(16px, 3vw, 28px);
      right: clamp(16px, 3vw, 28px);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--white);
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .archive-lightbox__close:hover {
      border-color: var(--border-light);
    }

    .archive-cell__caption {
      position: absolute;
      bottom: 0;
      left: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      height: 54px;
      font-size: 13px;
      font-weight: var(--font-medium);
      letter-spacing: -0.01em;
      color: var(--muted);
      line-height: 1;
    }

    .archive-cell__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 900px) {
      .archive-row {
        grid-template-columns: repeat(2, 1fr);
      }
      /* On 2-col layout, hide the vertical divider on every 2nd cell */
      .archive-cell:nth-child(2n)::after {
        display: none;
      }
    }

    @media (max-width: 540px) {
      .archive-row {
        grid-template-columns: repeat(2, 1fr);
      }
      .archive-cell__caption {
        font-size: 11px;
        padding: 12px 14px;
      }
    }
  </style>

  <script>
    // ── Archive grid — rendered from img/archive.json ────────────
    (function () {
      var grid = document.getElementById('archive-grid');
      if (!grid) return;

      fetch('/img/archive.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var items = data.items || data;
          var cols = 4;
          var html = '';

          for (var i = 0; i < items.length; i += cols) {
            var row = items.slice(i, i + cols);
            html += '<div class="archive-row">';
            row.forEach(function (item) {
              var captionHtml = item.caption
                ? '<div class="archive-cell__caption"><span class="archive-cell__dot" aria-hidden="true"></span>' + item.caption + '</div>'
                : '';
              html +=
                '<div class="archive-cell" data-reveal="img" data-src="' + item.src + '" data-caption="' + (item.caption || '') + '">' +
                  '<img class="archive-cell__image" src="' + item.src + '" alt="' + (item.caption || '') + '" loading="lazy">' +
                  captionHtml +
                '</div>';
            });
            html += '</div>';
          }

          grid.innerHTML = html;

          // Kick reveal observer if loaded after initial scan
          if (window.__revealObserver) {
            grid.querySelectorAll('[data-reveal]').forEach(function (el) {
              window.__revealObserver.observe(el);
            });
          }

          // Wire up lightbox clicks
          grid.addEventListener('click', function (e) {
            var cell = e.target.closest('.archive-cell');
            if (!cell) return;
            openLightbox(cell.dataset.src, cell.dataset.caption);
          });
        })
        .catch(function (err) {
          console.warn('archive.json failed to load', err);
        });
    }());

    // ── Lightbox ─────────────────────────────────────────────────
    (function () {
      var lb      = document.getElementById('archive-lightbox');
      var lbImg   = document.getElementById('lightbox-img');
      var lbCap   = document.getElementById('lightbox-caption');
      var lbClose = document.getElementById('lightbox-close');

      window.openLightbox = function (src, caption) {
        var scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
        lbImg.src = src;
        lbImg.alt = caption || '';
        lbCap.textContent = caption || '';
        lbCap.style.display = caption ? '' : 'none';
        document.body.style.overflow = 'hidden';
        document.body.style.paddingRight = scrollbarWidth + 'px';
        lb.classList.add('is-open');
      };

      function closeLightbox() {
        lb.classList.remove('is-open');
        document.body.style.overflow = '';
        document.body.style.paddingRight = '';
      }

      lbClose.addEventListener('click', closeLightbox);

      lb.addEventListener('click', function (e) {
        if (e.target === lb) closeLightbox();
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && lb.classList.contains('is-open')) closeLightbox();
      });
    }());
  </script>

  <script>
    // ── Vancouver clock ─────────────────────────────────────────
    (function () {
      var el = document.getElementById('van-time');
      if (!el) return;
      var fmt = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Vancouver',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
      var fmtTz = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/Vancouver',
        timeZoneName: 'short'
      });
      function tick() {
        var now = new Date();
        var tz = fmtTz.formatToParts(now).find(function (p) { return p.type === 'timeZoneName'; }).value;
        el.textContent = 'Vancouver, BC — ' + fmt.format(now) + ' ' + tz;
      }
      tick();
      setInterval(tick, 1000);
    }());
  </script>

  <script>
    // ── Contact pill: copy-to-clipboard ─────────────────────────
    (function () {
      const pill = document.getElementById('contact-pill');
      const btn  = pill && pill.querySelector('.contact-pill__copy');
      if (!pill || !btn) return;
      let resetTimer = null;
      btn.addEventListener('click', function () {
        const email = btn.dataset.email;
        clearTimeout(resetTimer);
        function markCopied() {
          pill.classList.add('is-copied');
          btn.setAttribute('aria-label', 'Copied!');
          resetTimer = setTimeout(function () {
            pill.classList.remove('is-copied');
            btn.setAttribute('aria-label', 'Copy email address');
          }, 1800);
        }
        navigator.clipboard.writeText(email).then(markCopied).catch(function () {
          const ta = document.createElement('textarea');
          ta.value = email;
          ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          markCopied();
        });
      });
    }());
  </script>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function (user) {
        if (!user) {
          window.netlifyIdentity.on('login', function () {
            document.location.href = '/admin/';
          });
        }
      });
    }
