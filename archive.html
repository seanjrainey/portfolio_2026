  <style>
    /* ── Archive page ───────────────────────────────────────── */
    .archive-hero {
      padding: clamp(3rem, 6vw, 6rem) 0 clamp(2rem, 4vw, 4rem);
    }

    .archive-hero__inner {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }

    .archive-headline {
      font-size: clamp(2.5rem, 5vw, 5rem);
      font-weight: var(--font-light);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--white);
    }

    /* ── Archive grid ───────────────────────────────────────── */
    .archive-grid {
      border-top: 1px solid var(--border);
    }

    .archive-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .archive-cell {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(40px, 5vw, 84px);
      aspect-ratio: 1 / 1;
      overflow: hidden;
    }

    /* Vertical dividers: inset so they don't touch the horizontal rules */
    .archive-cell:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 20px;
      bottom: 20px;
      width: 1px;
      background: var(--border);
    }

    .archive-cell__image {
      max-width: 62%;
      max-height: 62%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      transition: transform 0.45s cubic-bezier(0.76, 0, 0.24, 1);
    }

    .archive-cell:hover .archive-cell__image {
      transform: scale(1.04);
    }

    .archive-cell__caption {
      position: absolute;
      bottom: 0;
      left: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      height: 54px;
      font-size: 13px;
      font-weight: var(--font-medium);
      letter-spacing: -0.01em;
      color: var(--muted);
      line-height: 1;
    }

    .archive-cell__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 900px) {
      .archive-row {
        grid-template-columns: repeat(2, 1fr);
      }
      /* On 2-col layout, hide the vertical divider on every 2nd cell */
      .archive-cell:nth-child(2n)::after {
        display: none;
      }
    }

    @media (max-width: 540px) {
      .archive-row {
        grid-template-columns: repeat(2, 1fr);
      }
      .archive-cell__caption {
        font-size: 11px;
        padding: 12px 14px;
      }
    }
  </style>

  <script>
    // ── Archive grid — rendered from img/archive.json ────────────
    (function () {
      var grid = document.getElementById('archive-grid');
      if (!grid) return;

      fetch('/img/archive.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var items = data.items || data;
          var cols = 4;
          var html = '';

          for (var i = 0; i < items.length; i += cols) {
            var row = items.slice(i, i + cols);
            html += '<div class="archive-row">';
            row.forEach(function (item) {
              html +=
                '<div class="archive-cell" data-reveal="img">' +
                  '<img class="archive-cell__image" src="' + item.src + '" alt="' + item.caption + '" loading="lazy">' +
                  '<div class="archive-cell__caption">' +
                    '<span class="archive-cell__dot" aria-hidden="true"></span>' +
                    item.caption +
                  '</div>' +
                '</div>';
            });
            html += '</div>';
          }

          grid.innerHTML = html;

          // Kick reveal observer if loaded after initial scan
          if (window.__revealObserver) {
            grid.querySelectorAll('[data-reveal]').forEach(function (el) {
              window.__revealObserver.observe(el);
            });
          }
        })
        .catch(function (err) {
          console.warn('archive.json failed to load', err);
        });
    }());
  </script>

  <script>
    // ── Vancouver clock ─────────────────────────────────────────
    (function () {
      var el = document.getElementById('van-time');
      if (!el) return;
      var fmt = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Vancouver',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
      var fmtEst = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/New_York',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
      function tick() {
        el.textContent = 'Vancouver — ' + fmt.format(new Date()) + '  ·  EST ' + fmtEst.format(new Date());
      }
      tick();
      setInterval(tick, 1000);
    }());
  </script>

  <script>
    // ── Contact pill: copy-to-clipboard ─────────────────────────
    (function () {
      const pill = document.getElementById('contact-pill');
      const btn  = pill && pill.querySelector('.contact-pill__copy');
      if (!pill || !btn) return;
      let resetTimer = null;
      btn.addEventListener('click', function () {
        const email = btn.dataset.email;
        clearTimeout(resetTimer);
        function markCopied() {
          pill.classList.add('is-copied');
          btn.setAttribute('aria-label', 'Copied!');
          resetTimer = setTimeout(function () {
            pill.classList.remove('is-copied');
            btn.setAttribute('aria-label', 'Copy email address');
          }, 1800);
        }
        navigator.clipboard.writeText(email).then(markCopied).catch(function () {
          const ta = document.createElement('textarea');
          ta.value = email;
          ta.style.cssText = 'position:fixed;opacity:0;pointer-events:none';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          markCopied();
        });
      });
    }());
  </script>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function (user) {
        if (!user) {
          window.netlifyIdentity.on('login', function () {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
